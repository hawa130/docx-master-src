name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. v0.1.0). Required when triggering manually."
        required: true
        type: string

permissions:
  contents: read

env:
  PUBLISH_REPO: hawa130/docx-master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Resolve the tag once via env vars so downstream steps can reference it
      # without inlining workflow-input expressions into shell strings.
      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          PUSH_TAG: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RESOLVED="$DISPATCH_TAG"
          else
            RESOLVED="$PUSH_TAG"
          fi
          # Reject anything that isn't a plain tag-shaped string.
          case "$RESOLVED" in
            v[0-9]*) ;;
            *) echo "::error::invalid tag: $RESOLVED"; exit 1 ;;
          esac
          echo "tag=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "version=${RESOLVED#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache Bun's global install cache. The key is bun.lock-derived so a
      # lockfile change invalidates; the restore-keys fallback lets unrelated
      # runs share the cache when bun.lock hasn't moved.
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build skill bundle
        env:
          DOCX_MASTER_VERSION: ${{ steps.tag.outputs.version }}
        run: bun run build:skill

      # Clone the publish repo. Tolerates the empty-repo first-run case by
      # creating `main` locally when no branches exist yet.
      - name: Clone publish repo
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${PUBLISH_TOKEN}@github.com/${PUBLISH_REPO}.git" publish
          cd publish
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout -b main
          else
            git checkout main 2>/dev/null || git checkout -b main
          fi

      # Mirror dist/plugin/ to the publish repo root. dist/plugin/ is the
      # canonical publish-repo image: .claude-plugin/ + skills/docx-master/.
      # README + LICENSE come from src so they stay in sync.
      - name: Sync build output to publish repo
        run: |
          set -euo pipefail
          # Wipe publish/ contents except .git
          find publish -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          # dist/plugin/* → publish root
          rsync -a dist/plugin/ publish/
          # README + LICENSE from src
          cp README.md README.zh-CN.md LICENSE publish/

      - name: Commit & push to publish repo
        working-directory: publish
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No content changes; tagging existing HEAD."
          else
            git commit -m "release: $TAG"
          fi
          git push origin HEAD:main
          # Force-tag is intentional: re-running the workflow for the same
          # tag (via workflow_dispatch) should re-publish the snapshot.
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Create release on publish repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLISH_REPO }}
          token: ${{ secrets.PUBLISH_REPO_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/docx-master.zip
